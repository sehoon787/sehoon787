name: Update Vibe Dashboard

# HOW CCUSAGE DATA COLLECTION WORKS:
# ccusage reads local Claude Code session data from ~/.claude/projects/ on your machine.
# It does NOT use email addresses or connect to any cloud service.
#
# To update the dashboard with data from multiple accounts:
# 1. On each machine/account, run: npx ccusage daily --json > <account>-cc.json
# 2. Commit the generated *-cc.json files to this repo
# 3. This workflow will automatically merge them and regenerate the dashboard
#
# Account mapping (stored as secrets for reference, not used by ccusage directly):
#   EMAIL_PRIMARY   -> sehoon787-cc.json   (sehoon787@naver.com account)
#   EMAIL_SECONDARY -> aircok-cc.json      (aircok0115@gmail.com account)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    paths:
      - '*-cc.json'
      - 'cc.json'

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install -g vibe-dashboard

      - name: Generate dashboard
        env:
          EMAIL_PRIMARY: ${{ secrets.EMAIL_PRIMARY }}
          EMAIL_SECONDARY: ${{ secrets.EMAIL_SECONDARY }}
        run: |
          # Collect all ccusage JSON data files from both accounts.
          # Files are named *-cc.json (e.g., sehoon787-cc.json, aircok-cc.json).
          # EMAIL_PRIMARY ($EMAIL_PRIMARY) -> sehoon787-cc.json
          # EMAIL_SECONDARY ($EMAIL_SECONDARY) -> aircok-cc.json
          FILES=$(ls *-cc.json cc.json 2>/dev/null | sort -u | tr '\n' ' ')
          if [ -n "$FILES" ]; then
            echo "Generating dashboard from: $FILES"
            vibe-dashboard generate \
              -i $FILES \
              --output ./README.md \
              --svg-output ./vibe-card.svg
          else
            echo "No *-cc.json files found. Skipping dashboard generation."
            echo "To add data: run 'npx ccusage daily --json > <account>-cc.json' on each account machine and commit the file."
          fi

      - name: Customize SVG
        run: |
          if [ -f vibe-card.svg ]; then
            # Icon and title
            sed -i 's/🎸/⚡/g' vibe-card.svg
            sed -i 's/VibeDashboard/AI Dashboard/g' vibe-card.svg

            # Fix model names: VibeDashboard bug shows "4-6" for both opus and sonnet
            # Replace sequentially: first ">4-6 " → opus-4.6, second ">4-6 " → sonnet-4.6
            # Opus costs more (~80%), sonnet costs less (~19%), so opus appears first in SVG
            python3 -c "
import re
with open('vibe-card.svg', 'r', encoding='utf-8') as f:
    content = f.read()

count = [0]
def replace_model(match):
    count[0] += 1
    if count[0] == 1:
        return '>opus-4.6 '
    elif count[0] == 2:
        return '>sonnet-4.6 '
    return match.group(0)

content = re.sub(r'>4-6 ', replace_model, content)

# Add spacing: move Model Breakdown section down by 25px
content = content.replace('translate(25, 220)', 'translate(25, 245)')

# Adjust SVG height for extra spacing
content = content.replace('height=\"374\"', 'height=\"399\"')
content = content.replace('0 0 900 374', '0 0 900 399')
content = content.replace('height=\"373\"', 'height=\"398\"')

# Move footer down too
content = content.replace('y=\"354\"', 'y=\"379\"')

# Remove 'Powered by' from footer
content = re.sub(r' • Powered by <a[^>]*>[^<]*</a>', '', content)

with open('vibe-card.svg', 'w', encoding='utf-8') as f:
    f.write(content)
print('Fixed model names, spacing, and removed Powered by')
"
            echo "Customized SVG: icon, title, model names, spacing"
          fi

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "VibeDashboard Bot"
          git add README.md vibe-card.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Update Vibe Dashboard [skip ci]"
          git push
